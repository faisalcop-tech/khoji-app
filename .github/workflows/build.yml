name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          cmake \
          libffi-dev \
          libssl-dev \
          build-essential
        pip3 install --upgrade pip
        pip3 install buildozer==1.5.0
        pip3 install cython==0.29.33
    - name: Build APK
      run: |
        yes | buildozer android debug 2>&1
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: KhojiPro-APK
        path: bin/*.apk
